<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amir Kabab - مطعم أمير الكباب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap');
        * { font-family: 'Cairo', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .gradient-bg { background: linear-gradient(135deg, #0b0b0f 0%, #1a1a2e 50%, #16213e 100%); }
        .nav-link.active { background: rgba(126, 34, 206, 0.4); color: #c084fc; border-bottom: 2px solid #a855f7; }
        .staff-card, .rule-card { background: rgba(17, 24, 39, 0.6); border: 1px solid rgba(126, 34, 206, 0.2); }
        .rule-card:hover { border-color: #a855f7; background: rgba(126, 34, 206, 0.1); }
        .hidden-section { display: none; opacity: 0; transform: translateY(20px); }
        .show-section { display: block; opacity: 1; transform: translateY(0); animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">

    <nav class="bg-black/25 backdrop-blur-lg py-4 sticky top-0 z-50 border-b border-purple-500/10">
        <div class="container mx-auto px-4 flex flex-wrap justify-center gap-2 md:gap-6">
            <button onclick="showSection('home')" id="nav-home" class="nav-link active px-5 py-2 rounded-xl font-bold flex items-center gap-2">
                <i class="fas fa-home"></i> الرئيسية
            </button>
            <button onclick="showSection('rules')" id="nav-rules" class="nav-link px-5 py-2 rounded-xl font-bold flex items-center gap-2">
                <i class="fas fa-gavel"></i> القوانين
            </button>
            <button onclick="showSection('staff')" id="nav-staff" class="nav-link px-5 py-2 rounded-xl font-bold flex items-center gap-2">
                <i class="fas fa-users"></i> الموظفين
            </button>
            <a href="https://discord.gg/qqasVYdt" target="_blank" class="px-5 py-2 bg-[#5865F2] hover:bg-[#4752c4] rounded-xl font-bold flex items-center gap-2 shadow-lg hover:scale-105">
                <i class="fab fa-discord"></i> الدسكورد
            </a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        
        <section id="section-home" class="show-section">
            <div class="text-center max-w-4xl mx-auto">
                <h1 class="text-6xl md:text-8xl font-black mb-6 bg-gradient-to-r from-blue-500 via-black-500 to-black-400 bg-clip-text text-transparent py-4">
                    Amir Kabab
                </h1>
                <p class="text-xl text-gray-400 mb-12">أهلاً بك في البوابة الرسمية لمطعم أمير كباب</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-2xl mx-auto">
                    <div class="bg-gray-900/40 p-8 rounded-3xl border border-purple-900/20 hover:border-purple-500/50">
                        <i class="fas fa-file-signature text-4xl text-purple-500 mb-4"></i>
                        <h3 class="text-2xl font-bold mb-4">انضم إلينا</h3>
                        <button onclick="openForm()" class="w-full py-4 bg-purple-700 hover:bg-purple-600 rounded-2xl font-bold text-lg shadow-lg shadow-purple-900/20">فتح نموذج التقديم</button>
                    </div>
                    <div class="bg-gray-900/40 p-8 rounded-3xl border border-blue-900/20 hover:border-blue-500/50">
                        <i class="fas fa-info-circle text-4xl text-blue-500 mb-4"></i>
                        <h3 class="text-2xl font-bold mb-4">دليل الموظف</h3>
                        <button onclick="showSection('rules')" class="w-full py-4 bg-blue-700 hover:bg-blue-600 rounded-2xl font-bold text-lg shadow-lg shadow-blue-900/20">عرض القوانين</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-rules" class="hidden-section">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-extrabold mb-4 text-purple-400">لائحة القوانين والأنظمة</h2>
                <p class="text-gray-400">يجب على جميع الموظفين الالتزام التام بهذه البنود لتجنب العقوبات</p>
            </div>
            <div id="rules-container" class="grid grid-cols-1 lg:grid-cols-2 gap-4 max-w-6xl mx-auto">
                </div>
        </section>

        <section id="section-staff" class="hidden-section">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-extrabold mb-4 text-blue-400">طاقم الإدارة</h2>
                <p class="text-gray-400">تعرف على قادة فريق مطعم أمير كباب</p>
            </div>
            <div id="staff-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                </div>
        </section>

    </main>

    <div id="applyForm" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] hidden items-center justify-center p-4">
        <div class="bg-gray-900 border border-purple-500/30 rounded-[2rem] p-8 w-full max-w-lg shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold mb-2 text-purple-400">التقديم على المطعم</h2>
                <p class="text-gray-500">يرجى إدخال بياناتك بدقة</p>
            </div>
            <div class="space-y-4">
                <input id="name" type="text" placeholder="اسمك الحقيقي" class="w-full p-4 bg-gray-800/50 rounded-2xl border border-gray-700 focus:border-purple-500 outline-none transition-all">
                <input id="namec" type="text" placeholder="اسم شخصيتك" class="w-full p-4 bg-gray-800/50 rounded-2xl border border-gray-700 focus:border-purple-500 outline-none transition-all">
                <input id="age" type="number" placeholder="العمر" class="w-full p-4 bg-gray-800/50 rounded-2xl border border-gray-700 focus:border-purple-500 outline-none">
                <input id="ids" type="text" placeholder="ايديك دسكورد" class="w-full p-4 bg-gray-800/50 rounded-2xl border border-gray-700 focus:border-purple-500 outline-none">
                <textarea id="time" placeholder="ساعات تواجدك" class="w-full p-4 bg-gray-800/50 rounded-2xl border border-gray-700 focus:border-purple-500 outline-none h-28 resize-none"></textarea>
                <button onclick="submitForm()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 rounded-2xl font-bold text-xl transition-all transform hover:scale-[1.02]">إرسال التقديم</button>
                <button onclick="closeForm()" class="w-full py-2 text-gray-500 hover:text-white font-medium">تراجع</button>
            </div>
        </div>
    </div>

    <script>
        const rules = [
            "يجب على الموظف تمثيل نفسه والمطعم بأفضل صورة والالتزام بالأخلاق العالية في التعامل مع الجميع.",
            "يمنع منعاً باتاً التلفظ أو التسلط أو الإساءة لأي شخص داخل المطعم.",
            "يمنع استخدام مرافق المطعم لتحقيق مصالح شخصية والالتزام بالصدق.",
            "يجب ارتداء الزي الرسمي المعتمد طوال فترة العمل.",
            "يجب الالتزام باللباس المخصص لكل رتبة وعدم مخالفته.",
            "يمنع رفض البيع لأي زبون بناءً على خلافات شخصية.",
            "يمنع خدمة أي مواطن يرتدي 'ماسك' أو قناعاً يخفي ملامحه.",
            "لا يتم تسليم الوجبة للزبون إلا بعد إتمام عملية الدفع.",
            "يمنع تكرار دفع الحساب للزبائن بشكل غير مبرر.",
            "يمنع التلاعب بالفواتير أو تقديم خدمات مجانية أو تغيير الأسعار.",
            "يحق للموظف وجبتين كحد أقصى للاستخدام الشخصي (اصنعها بنفسك).",
            "يمنع القيام بأي نشاط إجرامي أو الاختباء داخل المطعم هرباً من السلطات.",
            "يمنع القيام بأي عمل خارج عن القانون وأنت ترتدي زي المطعم الرسمي.",
            "يمنع التحدث عن الأعمال الإجرامية داخل أو بالقرب من حدود المطعم.",
            "يمنع إشهار الأسلحة أو الأدوات الحادة داخل محيط المطعم.",
            "يمنع دخول المواطنين غير الموظفين إلى منطقة المطبخ نهائياً.",
            "يمنع استخدام 'النطح'، الضرب، أو 'الكلبشة' داخل المطعم.",
            "يمنع تجاوز الرتب العليا أو اتخاذ قرارات إدارية دون إذن.",
            "يمنع استغلال رتبتك للتسلط على الآخرين.",
            "الحد الاقصى لعدد الوجبات للشخص هي وجبة واحده فقط (صغير-كبير)."
        ];

        const staffMembers = [
            { name: "test", role: "Owner", avatar: "https://cdn.discordapp.com/attachments/1407510106618335324/1480164582071730227/3DFD46D6-232B-49EF-930C-974ADD6A11DF.png?ex=69e75eb0&is=69e60d30&hm=c0fab33a7747160452ce3ef248cfa4ad2daee37d7eae176b5247d2b6f5d97718&", color: "border-t-black-500" }
        ];

        function showSection(id) {
            ['home', 'rules', 'staff'].forEach(s => {
                document.getElementById('section-' + s).className = 'hidden-section';
                document.getElementById('nav-' + s).classList.remove('active');
            });
            document.getElementById('section-' + id).className = 'show-section';
            document.getElementById('nav-' + id).classList.add('active');
        }

        function renderContent() {
            
            document.getElementById('rules-container').innerHTML = rules.map((r, i) => `
                <div class="rule-card p-5 rounded-2xl flex items-start gap-4">
                    <span class="bg-purple-600/20 text-purple-400 font-bold px-3 py-1 rounded-lg text-sm">${i+1}</span>
                    <p class="text-gray-300 leading-relaxed text-sm md:text-base">${r}</p>
                </div>
            `).join('');

            
            document.getElementById('staff-list').innerHTML = staffMembers.map(m => `
                <div class="staff-card p-8 rounded-[2.5rem] text-center border-t-4 ${m.color}">
                    <img src="${m.avatar}" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-white/10 p-1">
                    <h3 class="text-xl font-bold">${m.name}</h3>
                    <p class="text-purple-400 text-sm mt-1 font-bold tracking-widest">${m.role}</p>
                </div>
            `).join('');
        }

        function openForm() { document.getElementById("applyForm").classList.replace('hidden', 'flex'); }
        function closeForm() { document.getElementById("applyForm").classList.replace('flex', 'hidden'); }

        async function submitForm() {
            const webhook = "https://discord.com/api/webhooks/1495420590889242734/hnTvm-s53eMdYU7fOJOcQl1QI0gXgkTs2RQp10gpmdcKsZSICNPhSBlU7jVmUVxzdln8";
            const payload = {
                embeds: [{
                    title: "🔔 طلب توظيف جديد",
                    color: 0x7e22ce,
                    fields: [
                        { name: "👤 الاسم", value: document.getElementById('name').value, inline: true },
                        { name: "🎂 العمر", value: document.getElementById('age').value, inline: true },
                        { name: "⏱️ اسم الشخصية", value: document.getElementById('namec').value, inline: false },
                        { name: "📋 ايدي دسكورد", value: document.getElementById('ids').value, inline: false },
                        { name: "📋 ساعات التواجد", value: document.getElementById('time').value, inline: false }
                    ],
                    footer: { text: "نظام أمير كباب الذكي" }, timestamp: new Date()
                }]
            };
            await fetch(webhook, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) });
            alert("تم إرسال طلبك! سيقوم المدير بمراجعته.");
            closeForm();
        }

        // استبدل وظيفة تحديث الحالة بهذا الكود
async function syncStatus() {
    try {
        const response = await fetch('/status');
        const data = await response.json();
        applicationOpen = data.open;
        
        const statusContainer = document.getElementById("application-status");
        if (applicationOpen) {
            statusContainer.innerHTML = `<div class="inline-flex items-center gap-2 px-4 py-2 bg-green-900/20 text-green-400 border border-green-800/30 rounded-full text-sm font-bold animate-pulse">التقديم مفتوح حالياً ✅</div>`;
        } else {
            statusContainer.innerHTML = `<div class="inline-flex items-center gap-2 px-4 py-2 bg-red-900/20 text-red-400 border border-red-800/30 rounded-full text-sm font-bold">التقديم مغلق حالياً ❌</div>`;
        }
    } catch (e) { console.log("خطأ في جلب الحالة"); }
}


// جعل الموقع يفحص الحالة كل 5 ثواني ليتغير تلقائياً عند استخدام البوت
setInterval(syncStatus, 5000);
window.onload = () => { renderAll(); syncStatus(); };

        window.onload = renderContent;
    </script>
</body>
</html>
